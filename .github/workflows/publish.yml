name: Publish to Steam Workshop

# Publishes an update to the mod's existing Workshop item on every push to main.
# Auth uses a cached SteamCMD session (config.vdf) stored as a secret, so no password
# or 2FA seed lives in GitHub. See the repo notes for how the two secrets are created:
#   STEAM_CONFIG_VDF  - base64 of your local ~/Steam/config/config.vdf after logging in once
#   STEAM_USERNAME    - your Steam account name (e.g. fibrewire)
on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - '.gitignore'
      - '.github/**'
  workflow_dispatch:

concurrency:
  group: workshop-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SteamCMD
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends lib32gcc-s1 rsync ca-certificates
          mkdir -p "$HOME/steamcmd"
          curl -sqL https://steamcdn-a.akamaihd.net/client/installer/steamcmd_linux.tar.gz \
            | tar zxf - -C "$HOME/steamcmd"

      - name: Restore Steam session
        run: |
          mkdir -p "$HOME/Steam/config"
          echo "${{ secrets.STEAM_CONFIG_VDF }}" | base64 -d > "$HOME/Steam/config/config.vdf"

      - name: Stage mod and build VDF
        run: |
          mkdir -p dist
          rsync -a --exclude Source --exclude .git --exclude .github \
                --exclude README.md --exclude .gitignore --exclude dist ./ dist/
          ITEMID="$(tr -d '[:space:]' < About/PublishedFileId.txt)"
          {
            echo '"workshopitem"'
            echo '{'
            echo '  "appid" "294100"'
            echo "  \"publishedfileid\" \"$ITEMID\""
            echo "  \"contentfolder\" \"$PWD/dist\""
            echo "  \"changenote\" \"CI build ${GITHUB_SHA::7}\""
            echo '}'
          } > item.vdf
          echo "Publishing Workshop item $ITEMID"
          cat item.vdf

      - name: Upload to Steam Workshop
        run: |
          out="$("$HOME/steamcmd/steamcmd.sh" +login "${{ secrets.STEAM_USERNAME }}" \
                 +workshop_build_item "$PWD/item.vdf" +quit 2>&1)"
          echo "$out"
          # SteamCMD often exits 0 even on failure, so verify explicitly.
          echo "$out" | grep -q "Success." || { echo "::error::Workshop upload failed (see log above)"; exit 1; }
